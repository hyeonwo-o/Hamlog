services:
  app:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - ./server/data:/app/server/data
      - ./server/uploads:/app/server/uploads
    env_file:
      - .env
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    restart: always
