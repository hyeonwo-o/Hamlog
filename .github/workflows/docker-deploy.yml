name: Docker Deploy

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Verify data integrity
        run: npm run verify:data

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E Test
        run: npm run test:e2e
      
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, blog]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Cleanup self-hosted runner logs
        run: |
          set -euo pipefail

          if [ -n "${RUNNER_TEMP:-}" ]; then
            RUNNER_ROOT="$(cd "${RUNNER_TEMP}/../.." && pwd)"
            if [ -d "${RUNNER_ROOT}/_diag" ]; then
              find "${RUNNER_ROOT}/_diag" -type f -mtime +7 -delete || true
            fi
          fi

      - name: Deploy to Server
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          COOKIE_SAME_SITE: ${{ secrets.COOKIE_SAME_SITE }}
          COOKIE_SECURE: ${{ secrets.COOKIE_SECURE }}
          TRUST_PROXY: ${{ secrets.TRUST_PROXY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NAVER_SITE_VERIFICATION: ${{ secrets.NAVER_SITE_VERIFICATION }}
          DAUM_SITE_VERIFICATION: ${{ secrets.DAUM_SITE_VERIFICATION }}
          DAUM_WEBMASTER_PIN: ${{ secrets.DAUM_WEBMASTER_PIN }}
        run: |
          set -euo pipefail

          : "${JWT_SECRET:?JWT_SECRET secret is required}"
          : "${ADMIN_PASSWORD:?ADMIN_PASSWORD secret is required}"

          # Convert repository name to lowercase
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="ghcr.io/$REPO"
          IMAGE_TAG="ghcr.io/$REPO:sha-${GITHUB_SHA::7}"
          PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' hamlog 2>/dev/null || true)
          
          echo "Deploying $IMAGE_TAG..."

          # Login to GHCR
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          cleanup_old_repo_images() {
            docker image ls "$IMAGE_REPO" --format '{{.Repository}}:{{.Tag}}' | while read -r image_ref; do
              [ -n "$image_ref" ] || continue

              if [ "$image_ref" = "$IMAGE_TAG" ] || [ "$image_ref" = "$PREVIOUS_IMAGE" ]; then
                continue
              fi

              docker image rm -f "$image_ref" >/dev/null 2>&1 || true
            done
          }

          # Free room before pulling the next release image.
          cleanup_old_repo_images

          # Pull latest image
          docker pull $IMAGE_TAG

          run_container() {
            local image="$1"
            docker run -d \
              --name hamlog \
              --restart unless-stopped \
              -p 4000:4000 \
              -v "$HOME/hamlog-data/data:/app/server/data" \
              -v "$HOME/hamlog-data/uploads:/app/server/uploads" \
              -e NODE_ENV=production \
              -e PORT=4000 \
              -e JWT_SECRET="$JWT_SECRET" \
              -e ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              -e CORS_ORIGINS="$CORS_ORIGINS" \
              -e COOKIE_SAME_SITE="$COOKIE_SAME_SITE" \
              -e COOKIE_SECURE="$COOKIE_SECURE" \
              -e TRUST_PROXY="$TRUST_PROXY" \
              -e SITE_URL="$SITE_URL" \
              -e GOOGLE_SITE_VERIFICATION="$GOOGLE_SITE_VERIFICATION" \
              -e NAVER_SITE_VERIFICATION="$NAVER_SITE_VERIFICATION" \
              -e DAUM_SITE_VERIFICATION="$DAUM_SITE_VERIFICATION" \
              -e DAUM_WEBMASTER_PIN="$DAUM_WEBMASTER_PIN" \
              "$image"
          }

          wait_for_health() {
            local attempt=0
            while [ "$attempt" -lt 15 ]; do
              if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
                return 0
              fi
              attempt=$((attempt + 1))
              sleep 2
            done
            return 1
          }

          docker rm -f hamlog 2>/dev/null || true

          run_container "$IMAGE_TAG"

          if ! wait_for_health; then
            echo "New deployment failed health check."
            docker logs hamlog || true
            docker rm -f hamlog || true

            if [ -n "$PREVIOUS_IMAGE" ]; then
              echo "Rolling back to $PREVIOUS_IMAGE"
              run_container "$PREVIOUS_IMAGE"

              if ! wait_for_health; then
                echo "Rollback health check failed."
                docker logs hamlog || true
              fi
            fi

            exit 1
          fi

          # Cleanup previous release images that are no longer needed on the runner.
          cleanup_old_repo_images
          docker builder prune --filter "until=168h" -f >/dev/null 2>&1 || true

      - name: Send Telegram Notification
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ *Deployment Successful!*
          
          Runner: blog
          Commit: ${{ github.sha }}
          New version is live on HamLog." \
          -d parse_mode="Markdown"

      - name: Send Failure Notification
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ *Deployment Failed!*
          
          Runner: blog
          Commit: ${{ github.sha }}
          Please check GitHub Actions for details." \
          -d parse_mode="Markdown"
